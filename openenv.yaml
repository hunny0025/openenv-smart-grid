name: email-triage-env
version: 1.0.0
description: >
  Real-world corporate email triage RL environment.
  Agents classify urgency, route emails to the correct team,
  and draft professional replies across three difficulty levels.

tasks:
  - id: easy
    name: Single-issue classification
    difficulty: easy
    max_steps: 3
    description: >
      Single clear email with obvious urgency and team.
      Graded on exact match of urgency (0.5) and team (0.5).

  - id: medium
    name: Multi-signal triage with reply
    difficulty: medium
    max_steps: 5
    description: >
      Ambiguous email with misleading tone. Agent must classify
      correctly AND draft a quality reply.
      Graded on urgency (0.3) + team (0.3) + reply quality (0.4).

  - id: hard
    name: Thread context reasoning
    difficulty: hard
    max_steps: 7
    description: >
      3-email thread where context shifts across messages. Agent
      must detect urgency escalation and route based on the FINAL state.
      Graded on context awareness (0.2) + urgency shift (0.3) +
      routing (0.3) + reply coherence (0.2).

action_space:
  type: structured
  fields:
    - name: urgency
      type: enum
      values: [low, medium, high, critical]
      description: Urgency classification of the email
    - name: team
      type: enum
      values: [billing, technical, sales, hr, management, legal]
      description: Team responsible for handling the email
    - name: reply_draft
      type: string
      description: 1-3 sentence professional reply to the sender
    - name: reasoning
      type: string
      description: Brief chain-of-thought explaining classification

observation_space:
  type: structured
  fields:
    - name: email_id
      type: string
      description: Unique email identifier
    - name: subject
      type: string
      description: Email subject line
    - name: body
      type: string
      description: Full email body or assembled thread
    - name: sender
      type: string
      description: Sender email address
    - name: timestamp
      type: string
      description: ISO-8601 timestamp
    - name: task_id
      type: string
      description: Current task difficulty level
    - name: step_number
      type: integer
      description: Current step index in the episode

reward:
  type: partial_credit
  range: [0.0, 1.0]
  description: >
    Weighted partial credit — never binary. Adjacent urgency levels
    get partial credit, related team categories earn partial marks,
    reply quality scales with keyword coverage and professionalism,
    and non-trivial reasoning earns a small bonus.

tags: [openenv, email, triage, nlp, real-world, corporate, classification]
